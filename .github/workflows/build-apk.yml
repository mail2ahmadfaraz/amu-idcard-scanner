name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk AMU-ID-Card-Scanner.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: amu-id-card-scanner-debug-apk
          path: AMU-ID-Card-Scanner.apk

      # Publishes a public, no-login-required, direct download link at:
      # https://github.com/<owner>/<repo>/releases/latest/download/AMU-ID-Card-Scanner.apk
      - name: Publish GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build ${{ github.run_number }}
          files: AMU-ID-Card-Scanner.apk
          generate_release_notes: false
