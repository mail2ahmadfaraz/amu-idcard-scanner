name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # Every build must be signed with the SAME debug key, or installing a newer
      # build over an older one on a device fails with INSTALL_FAILED_UPDATE_INCOMPATIBLE.
      # Generate it once and commit it back so all future runs reuse the same file.
      - name: Ensure fixed debug keystore exists
        run: |
          if [ ! -f app/debug.keystore ]; then
            keytool -genkeypair -v \
              -keystore app/debug.keystore \
              -storepass android -keypass android \
              -alias androiddebugkey \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=AMU ID Card Scanner Debug,O=AMU,C=IN"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add app/debug.keystore
            git commit -m "Add fixed debug keystore for consistent CI signing [skip ci]"
            git push
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk AMU-ID-Card-Scanner.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: amu-id-card-scanner-debug-apk
          path: AMU-ID-Card-Scanner.apk

      # Publishes a public, no-login-required, direct download link at:
      # https://github.com/<owner>/<repo>/releases/latest/download/AMU-ID-Card-Scanner.apk
      - name: Publish GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build ${{ github.run_number }}
          files: AMU-ID-Card-Scanner.apk
          generate_release_notes: false
